<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>범어1동 아파트 실거래가 조회</title>
    <style>
        /* 반응형 레이아웃 설정 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* 텍스트 드래그 방지 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }

        /* 모바일 최적화 */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                height: auto;
            }
        }

        .section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h3 { font-size: 16px; margin-bottom: 10px; color: #333; }

        select {
            height: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #0056b3; }

        input[type="text"] {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            background-color: #f9f9f9;
            color: #d9534f;
            font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

<div class="container">
    <div class="section">
        <h3>범어1동 아파트 목록</h3>
        <select id="aptList" size="15">
            <option value="15억 5,000">범어SK뷰</option>
            <option value="12억 8,000">범어역우방유쉘</option>
            <option value="14억 2,000">범어푸르지오</option>
            <option value="9억 5,000">범어쌍용예가</option>
            <option value="11억 0,000">범어센트럴푸르지오</option>
            <option value="10억 2,000">e편한세상범어</option>
            <option value="8억 7,000">범어에일린의뜰</option>
            <option value="13억 4,000">범어라온프라이빗</option>
            <option value="7억 8,000">범어동일하이빌</option>
            <option value="6억 5,000">범어청구하이츠</option>
            <option value="9억 1,000">범어태왕아너스</option>
            <option value="10억 5,000">범어효성해링턴</option>
            <option value="16억 2,000">두산위브더제니스</option>
            <option value="8억 2,000">범어숲화성파크드림</option>
            <option value="9억 8,000">범어현대아파트</option>
        </select>
    </div>

    <div class="btn-container">
        <button onclick="showPrice()">실거래가 확인 ➔</button>
    </div>

    <div class="section">
        <h3>최근 실거래가(평균)</h3>
        <input type="text" id="priceDisplay" readonly placeholder="아파트를 선택하세요">
    </div>
</div>

<script>
    // 가격 출력 함수
    function showPrice() {
        const list = document.getElementById('aptList');
        const display = document.getElementById('priceDisplay');
        
        if (list.value) {
            display.value = list.value + " 만원";
        } else {
            alert("목록에서 아파트를 먼저 선택해주세요.");
        }
    }

    // 도용 방지: 단축키(F12, Ctrl+U, Ctrl+Shift+I) 차단
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
            alert("소스 코드를 볼 수 없습니다.");
            return false;
        }
    };
</script>

</body>
</html>
