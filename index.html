<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소피스트박 AI 분석지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --pink: #ec4899;
    --teal: #0d9488;
    --gray-dark: #1e293b;
    --gray: #64748b;
    --white: #ffffff;
    --yellow: #f59e0b;
    --red: #ef4444;
    --green: #10b981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0f172a;
    color: var(--white);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── 상단 헤더 ── */
  #header {
    background: linear-gradient(135deg, #1a2744 0%, #0f172a 100%);
    border-bottom: 1px solid rgba(37,99,235,0.3);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1000;
    flex-shrink: 0;
  }

  #header h1 {
    font-size: 18px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  #header h1 span { color: #60a5fa; }

  .header-badge {
    background: rgba(37,99,235,0.2);
    border: 1px solid rgba(37,99,235,0.4);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: #93c5fd;
    font-weight: 500;
  }

  /* ── 사이드 패널 ── */
  #sidebar {
    position: absolute;
    left: 0; top: 56px;
    width: 200px;
    height: calc(100vh - 56px);
    background: rgba(15,23,42,0.95);
    border-right: 1px solid rgba(37,99,235,0.2);
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 12px 8px;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    color: var(--gray);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 8px 4px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: #94a3b8;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(37,99,235,0.15);
    border-color: rgba(37,99,235,0.4);
    color: #93c5fd;
  }

  .filter-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── 지도 컨테이너 ── */
  #map-container {
    flex: 1;
    margin-left: 200px;
    position: relative;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #map:active { cursor: grabbing; }

  /* ── 줌 컨트롤 ── */
  #zoom-controls {
    position: absolute;
    right: 16px;
    bottom: 80px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 800;
  }

  .zoom-btn {
    width: 40px; height: 40px;
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(37,99,235,0.3);
    border-radius: 8px;
    color: var(--white);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-weight: 300;
  }

  .zoom-btn:hover {
    background: rgba(37,99,235,0.3);
    border-color: rgba(37,99,235,0.6);
  }

  /* ── 구 선택 버튼 ── */
  #district-bar {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 800;
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(37,99,235,0.3);
    border-radius: 30px;
    padding: 6px 10px;
    backdrop-filter: blur(10px);
  }

  .district-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: #94a3b8;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .district-btn:hover, .district-btn.active {
    background: var(--blue);
    color: var(--white);
  }

  /* ── 범례 ── */
  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(37,99,235,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    z-index: 800;
    backdrop-filter: blur(10px);
  }

  #legend h4 {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #cbd5e1;
    margin-bottom: 4px;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── SVG 마커 스타일 ── */
  .apt-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 700;
    fill: white;
  }

  .apt-sub {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    font-weight: 400;
    fill: #bfdbfe;
  }

  .apt-price {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    font-weight: 700;
    fill: #fbbf24;
  }

  /* 카운터 */
  #counter {
    position: absolute;
    top: 12px;
    right: 16px;
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(37,99,235,0.3);
    border-radius: 10px;
    padding: 8px 14px;
    z-index: 800;
    font-size: 12px;
    color: #93c5fd;
    backdrop-filter: blur(10px);
  }

  #counter strong { color: #fbbf24; font-size: 16px; }

  /* 툴팁 */
  #tooltip {
    position: absolute;
    background: rgba(15,23,42,0.97);
    border: 1px solid rgba(37,99,235,0.4);
    border-radius: 10px;
    padding: 12px 16px;
    z-index: 1000;
    pointer-events: none;
    display: none;
    min-width: 180px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #tooltip h3 { font-size: 14px; font-weight: 700; color: white; margin-bottom: 4px; }
  #tooltip .t-row { display: flex; justify-content: space-between; gap: 16px; font-size: 11px; color: #94a3b8; margin-top: 3px; }
  #tooltip .t-val { color: #e2e8f0; font-weight: 600; }
  #tooltip .t-price { color: #fbbf24; font-weight: 700; }
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <h1>🏢 소피스트박 <span>AI 분석</span> 지도</h1>
  <div class="header-badge">추론(Inference)</div>
  <div class="header-badge">대구 전 지역</div>
</div>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="sidebar-label">표시 항목</div>
  <button class="filter-btn active" onclick="toggleFilter(this,'apt')">
    <span class="dot" style="background:#2563eb"></span>아파트
  </button>
  <button class="filter-btn active" onclick="toggleFilter(this,'reconstruction')">
    <span class="dot" style="background:#ec4899"></span>재건축
  </button>
  <button class="filter-btn active" onclick="toggleFilter(this,'auction')">
    <span class="dot" style="background:#1e293b;border:1px solid #64748b"></span>경매
  </button>
  <button class="filter-btn active" onclick="toggleFilter(this,'commercial')">
    <span class="dot" style="background:#0d9488"></span>상가
  </button>

  <div class="sidebar-label" style="margin-top:12px">가격 필터</div>
  <button class="filter-btn" onclick="setPrice(this,0)"><span class="dot" style="background:#60a5fa"></span>전체</button>
  <button class="filter-btn" onclick="setPrice(this,50000)"><span class="dot" style="background:#34d399"></span>~5억</button>
  <button class="filter-btn" onclick="setPrice(this,100000)"><span class="dot" style="background:#fbbf24"></span>5~10억</button>
  <button class="filter-btn" onclick="setPrice(this,999999)"><span class="dot" style="background:#f87171"></span>10억+</button>

  <div class="sidebar-label" style="margin-top:12px">세대수</div>
  <button class="filter-btn" onclick="setUnits(this,0)"><span class="dot" style="background:#60a5fa"></span>전체</button>
  <button class="filter-btn" onclick="setUnits(this,100)"><span class="dot" style="background:#a78bfa"></span>100세대+</button>
  <button class="filter-btn" onclick="setUnits(this,300)"><span class="dot" style="background:#f472b6"></span>300세대+</button>
  <button class="filter-btn" onclick="setUnits(this,500)"><span class="dot" style="background:#fb923c"></span>500세대+</button>
</div>

<!-- 지도 컨테이너 -->
<div id="map-container">

  <!-- 구 선택 바 -->
  <div id="district-bar">
    <button class="district-btn active" onclick="focusDistrict(this,'all')">전체</button>
    <button class="district-btn" onclick="focusDistrict(this,'jung')">중구</button>
    <button class="district-btn" onclick="focusDistrict(this,'dong')">동구</button>
    <button class="district-btn" onclick="focusDistrict(this,'seo')">서구</button>
    <button class="district-btn" onclick="focusDistrict(this,'nam')">남구</button>
    <button class="district-btn" onclick="focusDistrict(this,'buk')">북구</button>
    <button class="district-btn" onclick="focusDistrict(this,'suseong')">수성구</button>
    <button class="district-btn" onclick="focusDistrict(this,'dalseo')">달서구</button>
    <button class="district-btn" onclick="focusDistrict(this,'dalseong')">달성군</button>
  </div>

  <!-- 카운터 -->
  <div id="counter">표시 단지: <strong id="cnt">0</strong>개</div>

  <!-- SVG 지도 -->
  <svg id="map" viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(37,99,235,0.06)" stroke-width="0.5"/>
      </pattern>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- 배경 -->
    <rect width="1200" height="750" fill="#0f172a"/>
    <rect width="1200" height="750" fill="url(#bg-grad)"/>
    <rect width="1200" height="750" fill="url(#grid)"/>

    <!-- ══════════════════════════════════════
         대구 구역 경계 (단순화된 폴리곤)
    ══════════════════════════════════════ -->

    <!-- 중구 -->
    <polygon points="520,220 590,200 640,240 630,310 570,330 510,310 490,270" 
             fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.25)" stroke-width="1.5"
             class="district-zone" data-district="jung"/>
    <text x="570" y="268" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">중구</text>

    <!-- 동구 -->
    <polygon points="640,150 780,130 850,200 840,320 760,360 680,340 640,310 630,240"
             fill="rgba(16,185,129,0.07)" stroke="rgba(16,185,129,0.2)" stroke-width="1.5"
             class="district-zone" data-district="dong"/>
    <text x="740" y="250" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">동구</text>

    <!-- 서구 -->
    <polygon points="380,220 490,200 510,270 490,340 430,360 360,320 350,260"
             fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.2)" stroke-width="1.5"
             class="district-zone" data-district="seo"/>
    <text x="430" y="285" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">서구</text>

    <!-- 북구 -->
    <polygon points="420,80 640,60 660,160 640,200 590,200 520,220 490,200 430,190 390,150"
             fill="rgba(168,85,247,0.07)" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"
             class="district-zone" data-district="buk"/>
    <text x="540" y="145" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">북구</text>

    <!-- 남구 -->
    <polygon points="510,310 570,330 630,310 640,380 600,430 530,440 480,400 480,350"
             fill="rgba(236,72,153,0.07)" stroke="rgba(236,72,153,0.2)" stroke-width="1.5"
             class="district-zone" data-district="nam"/>
    <text x="560" y="385" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">남구</text>

    <!-- 수성구 -->
    <polygon points="630,310 760,360 840,320 870,400 840,480 760,520 680,510 620,480 600,430 640,380"
             fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="2"
             class="district-zone" data-district="suseong"/>
    <text x="740" y="430" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">수성구</text>

    <!-- 달서구 -->
    <polygon points="350,320 480,340 530,440 510,520 440,560 340,540 280,460 290,370"
             fill="rgba(251,146,60,0.07)" stroke="rgba(251,146,60,0.2)" stroke-width="1.5"
             class="district-zone" data-district="dalseo"/>
    <text x="400" y="450" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">달서구</text>

    <!-- 달성군 -->
    <polygon points="180,400 290,370 340,540 440,560 510,520 530,600 480,660 360,680 230,650 140,560 120,470"
             fill="rgba(20,184,166,0.07)" stroke="rgba(20,184,166,0.2)" stroke-width="1.5"
             class="district-zone" data-district="dalseong"/>
    <text x="310" y="600" text-anchor="middle" fill="rgba(148,163,184,0.5)" font-size="13" font-weight="700" font-family="Noto Sans KR">달성군</text>

    <!-- ══════════════════════════════════════
         도로망 (주요 도로)
    ══════════════════════════════════════ -->
    <g stroke="rgba(71,85,105,0.4)" stroke-width="1" fill="none">
      <!-- 동서 간선 -->
      <line x1="150" y1="300" x2="900" y2="300"/>
      <line x1="150" y1="380" x2="900" y2="380"/>
      <line x1="200" y1="460" x2="900" y2="460"/>
      <!-- 남북 간선 -->
      <line x1="420" y1="60" x2="420" y2="680"/>
      <line x1="580" y1="60" x2="580" y2="680"/>
      <line x1="700" y1="130" x2="700" y2="580"/>
      <line x1="300" y1="200" x2="300" y2="680"/>
      <!-- 사선 도로 -->
      <line x1="490" y1="200" x2="640" y2="380"/>
      <line x1="630" y1="240" x2="840" y2="320"/>
    </g>

    <!-- ══════════════════════════════════════
         하천 (신천, 금호강)
    ══════════════════════════════════════ -->
    <path d="M 600 80 Q 610 180 600 280 Q 590 360 580 440 Q 570 520 560 620"
          fill="none" stroke="rgba(56,189,248,0.35)" stroke-width="5" stroke-linecap="round"/>
    <text x="622" y="200" fill="rgba(56,189,248,0.5)" font-size="10" font-family="Noto Sans KR" transform="rotate(85,622,200)">신천</text>

    <path d="M 150 220 Q 300 200 450 210 Q 560 215 640 200 Q 720 185 850 190"
          fill="none" stroke="rgba(56,189,248,0.3)" stroke-width="4" stroke-linecap="round"/>
    <text x="480" y="198" fill="rgba(56,189,248,0.4)" font-size="10" font-family="Noto Sans KR">금호강</text>

    <!-- ══════════════════════════════════════
         아파트 마커 그룹
    ══════════════════════════════════════ -->
    <g id="markers-group"></g>

    <!-- 동서남북 나침반 -->
    <g transform="translate(1140,700)">
      <circle r="20" fill="rgba(15,23,42,0.8)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
      <text y="-6" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="700" font-family="Noto Sans KR">N</text>
      <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(37,99,235,0.4)" stroke-width="0.5"/>
      <line x1="-14" y1="0" x2="14" y2="0" stroke="rgba(37,99,235,0.4)" stroke-width="0.5"/>
      <polygon points="0,-14 -4,-4 0,-8 4,-4" fill="#2563eb"/>
    </g>

    <!-- 스케일 바 -->
    <g transform="translate(30,720)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#64748b" stroke-width="2"/>
      <line x1="80" y1="-4" x2="80" y2="4" stroke="#64748b" stroke-width="2"/>

    </g>

  <!-- 줌 컨트롤 -->
  <div id="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
    <button class="zoom-btn" onclick="resetView()" title="초기화" style="font-size:14px">⌂</button>
  </div>

  <!-- 범례 -->
  <div id="legend">
    <h4>범례</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>일반 아파트</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div>재건축 추진</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0d9488"></div>재개발 구역</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e293b;border:1px solid #475569"></div>경매 물건</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>상가 경매</div>
  </div>

  <!-- 툴팁 -->
  <div id="tooltip">
    <h3 id="tt-name"></h3>
    <div class="t-row"><span>위치</span><span class="t-val" id="tt-loc"></span></div>
    <div class="t-row"><span>세대수</span><span class="t-val" id="tt-units"></span></div>
    <div class="t-row"><span>최근 거래</span><span class="t-price" id="tt-price"></span></div>
    <div class="t-row"><span>유형</span><span class="t-val" id="tt-type"></span></div>
  </div>

</div>

<script>
// ══════════════════════════════════════
// 데이터: 대구 전 지역 주요 아파트 단지
// ══════════════════════════════════════
const DATA = [
  // ── 수성구 황금동 (이미지 기반) ──
  {id:1, name:'힐스테이트', loc:'수성구 황금동', units:750, price:'18.5억', priceVal:185000, type:'apt', district:'suseong', x:700, y:430, status:''},
  {id:2, name:'유림노르웨이', loc:'수성구 황금동', units:576, price:'12.3억', priceVal:123000, type:'apt', district:'suseong', x:750, y:370, status:''},
  {id:3, name:'에일린의뜰', loc:'수성구 황금동', units:719, price:'14.2억', priceVal:142000, type:'apt', district:'suseong', x:660, y:380, status:''},

// 상태
// ══════════════════════════════════════
let scale = 1, tx = 0, ty = 0;
let isDragging = false, startX, startY, startTx, startTy;
let activeFilters = {apt:true, reconstruction:true, auction:true, commercial:true};
let maxPrice = 999999, minUnits = 0;
let focusedDistrict = 'all';

const svg = document.getElementById('map');
const markersGroup = document.getElementById('markers-group');
const tooltip = document.getElementById('tooltip');

// ══════════════════════════════════════
// 마커 렌더링
// ══════════════════════════════════════
function getColor(type) {
  return {apt:'#2563eb', reconstruction:'#ec4899', auction:'#1e293b', commercial:'#0d9488'}[type] || '#2563eb';
}
function getBorder(type) {
  return {apt:'#60a5fa', reconstruction:'#f472b6', auction:'#64748b', commercial:'#2dd4bf'}[type] || '#60a5fa';
}

function renderMarkers() {
  markersGroup.innerHTML = '';
  let count = 0;

  DATA.forEach(d => {
    if (!activeFilters[d.type]) return;
    if (d.priceVal > 0 && d.priceVal > maxPrice) return;
    if (d.units > 1 && d.units < minUnits) return;
    if (focusedDistrict !== 'all' && d.district !== focusedDistrict) return;

    count++;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${d.x},${d.y})`);
    g.setAttribute('class', 'marker');
    g.style.cursor = 'pointer';

    const bg = getColor(d.type);
    const bd = getBorder(d.type);
    const w = Math.max(70, d.name.length * 9 + 20);
    const h = d.price ? 42 : 30;

    // 배경
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', -w/2); rect.setAttribute('y', -h/2);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', 6);
    rect.setAttribute('fill', bg);
    rect.setAttribute('stroke', bd); rect.setAttribute('stroke-width', '1.5');
    rect.setAttribute('fill-opacity','0.92');
    g.appendChild(rect);

    // 이름
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('y', d.price ? -6 : 4);
    txt.setAttribute('class','apt-label');
    txt.textContent = d.name;
    g.appendChild(txt);

    // 세대수
    if(d.units > 1) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg','text');
      sub.setAttribute('text-anchor','middle');
      sub.setAttribute('y', d.price ? 8 : 15);
      sub.setAttribute('class','apt-sub');
      sub.textContent = d.units + '세대';
      g.appendChild(sub);
    }

    // 가격
    if(d.price) {
      const pr = document.createElementNS('http://www.w3.org/2000/svg','text');
      pr.setAttribute('text-anchor','middle');
      pr.setAttribute('y', 20);
      pr.setAttribute('class','apt-price');
      pr.textContent = d.price;
      g.appendChild(pr);
    }

    // 상태 뱃지
    if(d.status) {
      const sb = document.createElementNS('http://www.w3.org/2000/svg','g');
      const sw = d.status.length * 8 + 10;
      const sr = document.createElementNS('http://www.w3.org/2000/svg','rect');
      sr.setAttribute('x', -sw/2); sr.setAttribute('y', h/2+2);
      sr.setAttribute('width', sw); sr.setAttribute('height', 14);
      sr.setAttribute('rx', 3);
      sr.setAttribute('fill', d.type==='reconstruction' ? '#db2777' : '#0f172a');
      sr.setAttribute('stroke', d.type==='reconstruction' ? '#f472b6' : '#475569');
      sr.setAttribute('stroke-width','1');
      sb.appendChild(sr);
      const st = document.createElementNS('http://www.w3.org/2000/svg','text');
      st.setAttribute('text-anchor','middle'); st.setAttribute('y', h/2+12);
      st.setAttribute('font-family','Noto Sans KR'); st.setAttribute('font-size','8');
      st.setAttribute('fill', d.type==='reconstruction' ? '#fce7f3' : '#94a3b8');
      st.setAttribute('font-weight','700');
      st.textContent = d.status;
      sb.appendChild(st);
      g.appendChild(sb);
    }

    // 이벤트
    g.addEventListener('mouseenter', (e) => showTooltip(e, d));
    g.addEventListener('mouseleave', () => { tooltip.style.display='none'; });
    g.addEventListener('click', () => showTooltip(null, d, true));

    markersGroup.appendChild(g);
  });

  document.getElementById('cnt').textContent = count;
}

// ══════════════════════════════════════
// 툴팁
// ══════════════════════════════════════
function showTooltip(e, d, pinned=false) {
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-loc').textContent = d.loc;
  document.getElementById('tt-units').textContent = d.units > 1 ? d.units+'세대' : '-';
  document.getElementById('tt-price').textContent = d.price || (d.status||'-');
  const typeMap = {apt:'아파트', reconstruction:'재건축', auction:'경매', commercial:'상가'};
  document.getElementById('tt-type').textContent = typeMap[d.type]||d.type;
  tooltip.style.display = 'block';
  if(e) {
    const cont = document.getElementById('map-container');
    const r = cont.getBoundingClientRect();
    let lx = e.clientX - r.left + 12;
    let ly = e.clientY - r.top + 12;
    if(lx + 200 > r.width) lx = lx - 224;
    if(ly + 120 > r.height) ly = ly - 130;
    tooltip.style.left = lx+'px';
    tooltip.style.top = ly+'px';
  }
}

// ══════════════════════════════════════
// 줌 & 패닝
// ══════════════════════════════════════
function applyTransform() {
  svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  svg.style.transformOrigin = 'center center';
}

function zoomIn() {
  scale = Math.min(scale * 1.3, 8);
  applyTransform();
}
function zoomOut() {
  scale = Math.max(scale / 1.3, 0.5);
  applyTransform();
}
function resetView() {
  scale = 1; tx = 0; ty = 0;
  applyTransform();
  focusedDistrict = 'all';
  document.querySelectorAll('.district-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.district-btn').classList.add('active');
  renderMarkers();
}

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  scale = Math.min(Math.max(scale * factor, 0.5), 8);
  applyTransform();
}, {passive:false});

svg.addEventListener('mousedown', (e) => {
  isDragging = true;
  startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', (e) => {
  if(!isDragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { isDragging = false; });

// 터치
svg.addEventListener('touchstart', (e) => {
  if(e.touches.length===1){
    isDragging=true;
    startX=e.touches[0].clientX; startY=e.touches[0].clientY;
    startTx=tx; startTy=ty;
  }
},{passive:true});
svg.addEventListener('touchmove', (e) => {
  if(isDragging && e.touches.length===1){
    tx = startTx + (e.touches[0].clientX-startX);
    ty = startTy + (e.touches[0].clientY-startY);
    applyTransform();
  }
},{passive:true});
svg.addEventListener('touchend', ()=>{ isDragging=false; });

// ══════════════════════════════════════
// 필터 & 포커스
// ══════════════════════════════════════
function toggleFilter(btn, type) {
  activeFilters[type] = !activeFilters[type];
  btn.classList.toggle('active');
  renderMarkers();
}

function setPrice(btn, max) {
  maxPrice = max;
  document.querySelectorAll('[onclick^="setPrice"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
}

function setUnits(btn, min) {
  minUnits = min;
  document.querySelectorAll('[onclick^="setUnits"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
}

const districtCenters = {
  all:  {x:600, y:375, z:1},
  jung: {x:580, y:270, z:3},
  dong: {x:740, y:240, z:2.5},
  seo:  {x:430, y:285, z:3},
  nam:  {x:560, y:390, z:3},
  buk:  {x:540, y:145, z:2.5},
  suseong:{x:740, y:430, z:2.5},
  dalseo:{x:420, y:450, z:2.5},
  dalseong:{x:300, y:570, z:2},
};

function focusDistrict(btn, district) {
  focusedDistrict = district;
  document.querySelectorAll('.district-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const c = districtCenters[district];
  const cont = document.getElementById('map-container');
  const cw = cont.clientWidth, ch = cont.clientHeight;
  // SVG is 1200x750
  scale = c.z;
  tx = cw/2 - c.x * scale;
  ty = ch/2 - c.y * scale;
  applyTransform();
  renderMarkers();
}

// ══════════════════════════════════════
// 초기 렌더
// ══════════════════════════════════════
renderMarkers();
</script>
