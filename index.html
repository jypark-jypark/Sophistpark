<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>대구 부동산 AI 분석 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111827;
  --surface: #1f2937;
  --blue: #3b82f6;
  --blue-bright: #60a5fa;
  --pink: #ec4899;
  --teal: #10b981;
  --yellow: #f59e0b;
  --slate: #94a3b8;
  --white: #f8fafc;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family:'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--white);
  touch-action: none;
}

/* ═══ 헤더 ═══ */
#header {
  position: fixed;
  top:0; left:0; right:0;
  height: 50px;
  background: rgba(15,23,42,0.97);
  border-bottom: 1px solid rgba(59,130,246,0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  z-index: 1000;
}
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon {
  width:28px; height:28px;
  background: linear-gradient(135deg,#3b82f6,#818cf8);
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
}
.logo-text .brand { font-size:12px; font-weight:800; color:#93c5fd; letter-spacing:-0.2px; }
.logo-text .sub   { font-size:9px;  color:#64748b; }
.hright { display:flex; align-items:center; gap:5px; }
.badge {
  background:rgba(59,130,246,0.15);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:14px; padding:3px 8px;
  font-size:10px; color:#93c5fd; font-weight:600; white-space:nowrap;
}
.cnt-badge {
  background:rgba(245,158,11,0.15);
  border:1px solid rgba(245,158,11,0.35);
  border-radius:14px; padding:3px 8px;
  font-size:10px; color:#fbbf24; font-weight:700; white-space:nowrap;
}

/* ═══ 구 선택 스크롤 바 ═══ */
#dbar {
  position: fixed;
  top:50px; left:0; right:0;
  height:36px;
  background: rgba(15,23,42,0.96);
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex; align-items:center;
  overflow-x:auto; overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  gap:4px; padding:0 10px;
  z-index:990;
}
#dbar::-webkit-scrollbar { display:none; }
.d-btn {
  flex-shrink:0;
  padding:3px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent;
  color:#94a3b8;
  font-size:11px; font-family:'Noto Sans KR',sans-serif; font-weight:600;
  cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.d-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

/* ═══ 지도 래퍼 ═══ */
#mwrap {
  position:fixed;
  top:86px; left:0; right:0; bottom:0;
  overflow:hidden;
  background:#0c1525;
  touch-action:none;
}

/* SVG 지도 — 절대 위치, JS가 transform으로 제어 */
#map {
  position:absolute;
  top:0; left:0;
  width:1200px; height:750px;
  transform-origin:0 0;
  will-change:transform;
  cursor:grab;
  user-select:none;
}
#map:active { cursor:grabbing; }

/* ═══ 줌 버튼 ═══ */
#zbtn {
  position:fixed; right:11px; bottom:108px;
  display:flex; flex-direction:column; gap:5px; z-index:950;
}
.zb {
  width:40px; height:40px;
  background:rgba(22,30,46,0.96);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px; color:#fff;
  font-size:22px; font-weight:300;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--shadow); transition:background 0.15s;
}
.zb:active { background:rgba(59,130,246,0.4); }

/* ═══ 필터 토글 FAB ═══ */
#ftoggle {
  position:fixed; left:11px; bottom:18px;
  width:44px; height:44px;
  background:var(--blue); border:none; border-radius:50%;
  color:#fff; font-size:19px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 4px 18px rgba(59,130,246,0.5);
  z-index:970; transition:transform 0.2s;
}
#ftoggle.open { transform:rotate(45deg); }

/* ═══ 하단 드로어 ═══ */
#drawer {
  position:fixed; left:0; right:0; bottom:-100%;
  background:rgba(14,22,38,0.98);
  border-top:1px solid rgba(59,130,246,0.22);
  border-radius:18px 18px 0 0;
  padding:12px 14px 28px;
  z-index:960; transition:bottom 0.3s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  max-height:65vh; overflow-y:auto;
}
#drawer.open { bottom:0; }
.dhandle {
  width:34px; height:4px; background:rgba(255,255,255,0.18);
  border-radius:2px; margin:0 auto 12px;
}
.fsec { margin-bottom:14px; }
.ftitle {
  font-size:9px; font-weight:700; color:#64748b;
  letter-spacing:1.2px; text-transform:uppercase; margin-bottom:8px;
}
.chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  display:flex; align-items:center; gap:5px;
  padding:5px 11px; border-radius:18px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  color:#94a3b8; font-size:12px;
  font-family:'Noto Sans KR',sans-serif; font-weight:500;
  cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.chip.active {
  border-color:rgba(59,130,246,0.5);
  background:rgba(59,130,246,0.18); color:#93c5fd;
}
.cdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ═══ 범례 ═══ */
#legend {
  position:fixed; right:11px; bottom:18px;
  background:rgba(14,22,38,0.92);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:10px; padding:8px 11px; z-index:950;
  backdrop-filter:blur(10px);
}
#legend h4 {
  font-size:8px; color:#64748b; letter-spacing:1px;
  font-weight:700; text-transform:uppercase; margin-bottom:5px;
}
.lr { display:flex; align-items:center; gap:6px; font-size:10px; color:#cbd5e1; margin-bottom:3px; }
.ld { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

/* ═══ 정보 카드 ═══ */
#icard {
  position:fixed; bottom:72px; left:50%;
  transform:translateX(-50%) translateY(0);
  background:rgba(14,22,38,0.98);
  border:1px solid rgba(59,130,246,0.35);
  border-radius:14px; padding:13px 16px;
  min-width:210px; max-width:86vw;
  z-index:980; backdrop-filter:blur(16px);
  box-shadow:0 8px 40px rgba(0,0,0,0.65);
  display:none; animation:sup 0.2s ease;
}
@keyframes sup {
  from { transform:translateX(-50%) translateY(16px); opacity:0; }
  to   { transform:translateX(-50%) translateY(0); opacity:1; }
}
#icard .xbtn {
  position:absolute; top:8px; right:10px;
  background:none; border:none; color:#64748b; font-size:15px; cursor:pointer;
}
#icard h3 { font-size:14px; font-weight:800; color:#fff; margin-bottom:7px; }
.irow {
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; font-size:11px; color:#64748b;
  margin-top:4px; border-top:1px solid rgba(255,255,255,0.06); padding-top:4px;
}
.irow:first-of-type { border-top:none; padding-top:0; margin-top:0; }
.ival  { color:#e2e8f0; font-weight:600; }
.ipr   { color:#fbbf24; font-weight:800; font-size:13px; }
.ibadge {
  background:rgba(59,130,246,0.2); border-radius:4px;
  padding:1px 6px; font-size:10px; color:#93c5fd; font-weight:600;
}

/* ═══ SVG 텍스트 클래스 ═══ */
.ml { font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:800; fill:#fff; }
.ms { font-family:'Noto Sans KR',sans-serif; font-size:11px; font-weight:400; fill:#bfdbfe; }
.mp { font-family:'Noto Sans KR',sans-serif; font-size:11px; font-weight:700; fill:#fcd34d; }
.mst{ font-family:'Noto Sans KR',sans-serif; font-size:9px;  font-weight:700; }
</style>
</head>

// ─── 상태 ───
let sc=1, tx=0, ty=0;
let panning=false, px0,py0,ptx,pty;
let pinching=false, pd0,ps0,pmx,pmy;
let afilt={apt:true,reconstruction:true,auction:true,commercial:true};
let priceMode='all', minUnits=0, distFocus='all', drawerOpen=false;

const mapEl = document.getElementById('map');
const mgEl  = document.getElementById('mg');
const wrap  = document.getElementById('mwrap');

const COLORS = {
  apt:            {bg:'#1d4ed8', bk:'#60a5fa'},
  reconstruction: {bg:'#9d174d', bk:'#f472b6'},
  auction:        {bg:'#1e293b', bk:'#64748b'},
  commercial:     {bg:'#064e3b', bk:'#34d399'},
};

// ─── 마커 렌더 ───
function render() {
  mgEl.innerHTML=''; let cnt=0;
  DATA.forEach(d=>{
    if(!afilt[d.type]) return;
    if(priceMode==='under5'  && (d.pv<=0||d.pv>50000))   return;
    if(priceMode==='5to10'   && (d.pv<=50000||d.pv>100000)) return;
    if(priceMode==='over10'  && d.pv<=100000) return;
    if(d.units>1 && d.units<minUnits) return;
    if(distFocus!=='all' && d.d!==distFocus) return;
    cnt++;
    const c=COLORS[d.type]||COLORS.apt;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${d.x},${d.y})`);
    g.style.cursor='pointer';

    const lines=[d.name];
    if(d.units>1) lines.push(d.units+'세대');
    if(d.price)   lines.push(d.price);
    const lh=16, px=10, py=7;
    const w=Math.max(74, d.name.length*10+px*2);
    const h=lines.length*lh+py*2;

    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',-w/2); rect.setAttribute('y',-h/2);
    rect.setAttribute('width',w); rect.setAttribute('height',h);
    rect.setAttribute('rx',7); rect.setAttribute('fill',c.bg);
    rect.setAttribute('stroke',c.bk); rect.setAttribute('stroke-width','1.8');
    rect.setAttribute('fill-opacity','0.93');
    g.appendChild(rect);

    const sy=-h/2+py+lh*0.78;
    lines.forEach((ln,i)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle'); t.setAttribute('y',sy+i*lh);
      t.setAttribute('class', i===0?'ml': (ln.includes('억')&&d.price===ln)?'mp':'ms');
      t.textContent=ln; g.appendChild(t);
    });

    if(d.status){
      const bw=d.status.length*7.5+10;
      const br=document.createElementNS('http://www.w3.org/2000/svg','rect');
      br.setAttribute('x',-bw/2); br.setAttribute('y',h/2+2);
      br.setAttribute('width',bw); br.setAttribute('height',14); br.setAttribute('rx',4);
      br.setAttribute('fill',d.type==='reconstruction'?'#7f1d4e':'#0f172a');
      br.setAttribute('stroke',d.type==='reconstruction'?'#f472b6':'#334155');
      br.setAttribute('stroke-width','1'); g.appendChild(br);
      const bt=document.createElementNS('http://www.w3.org/2000/svg','text');
      bt.setAttribute('text-anchor','middle'); bt.setAttribute('y',h/2+12);
      bt.setAttribute('class','mst');
      bt.setAttribute('fill',d.type==='reconstruction'?'#fce7f3':'#94a3b8');
      bt.textContent=d.status; g.appendChild(bt);
    }
    g.addEventListener('click',e=>{e.stopPropagation();showCard(d);});
    mgEl.appendChild(g);
  });
  document.getElementById('cnt').textContent=cnt;
}

// ─── 정보 카드 ───
const TM={apt:'아파트',reconstruction:'재건축',auction:'경매',commercial:'상가'};
function showCard(d){
  document.getElementById('ic-name').textContent=d.name;
  document.getElementById('ic-loc').textContent=d.loc;
  document.getElementById('ic-units').textContent=d.units>1?d.units+'세대':'-';
  document.getElementById('ic-price').textContent=d.price||d.status||'-';
  document.getElementById('ic-type').textContent=TM[d.type]||d.type;
  document.getElementById('icard').style.display='block';
}
wrap.addEventListener('click',()=>{ document.getElementById('icard').style.display='none'; });

// ─── 변환 ───
function applyT(){ mapEl.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`; }

function initView(){
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  sc=ww/1200; tx=0; ty=(wh-750*sc)/2; applyT();
}

function zoomAt(cx,cy,f){
  const ns=Math.min(Math.max(sc*f,0.25),12);
  tx=cx-(cx-tx)*(ns/sc); ty=cy-(cy-ty)*(ns/sc); sc=ns; applyT();
}
function zoomIn(){ const r=wrap.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,1.3); }
function zoomOut(){ const r=wrap.getBoundingClientRect(); zoomAt(r.width/2,r.height/2,0.77); }
function resetView(){
  initView(); distFocus='all';
  document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.d-btn').classList.add('active');
  render();
}

// ─── 마우스 ───
wrap.addEventListener('mousedown',e=>{panning=true;px0=e.clientX;py0=e.clientY;ptx=tx;pty=ty;});
window.addEventListener('mousemove',e=>{ if(!panning)return; tx=ptx+(e.clientX-px0); ty=pty+(e.clientY-py0); applyT(); });
window.addEventListener('mouseup',()=>panning=false);
wrap.addEventListener('wheel',e=>{ e.preventDefault(); const r=wrap.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:0.87); },{passive:false});

// ─── 터치 ───
function tdist(t){ return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY); }
function tmid(t){ return {x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2}; }

wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    panning=true; pinching=false;
    px0=e.touches[0].clientX; py0=e.touches[0].clientY; ptx=tx; pty=ty;
  } else if(e.touches.length===2){
    panning=false; pinching=true;
    pd0=tdist(e.touches); ps0=sc;
    const m=tmid(e.touches), r=wrap.getBoundingClientRect();
    pmx=m.x-r.left; pmy=m.y-r.top; ptx=tx; pty=ty;
  }
},{passive:false});

wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(pinching&&e.touches.length===2){
    const nd=tdist(e.touches), ns=Math.min(Math.max(ps0*nd/pd0,0.25),12);
    const m=tmid(e.touches), r=wrap.getBoundingClientRect();
    const cx=m.x-r.left, cy=m.y-r.top;
    tx=cx-(pmx-ptx+cx)*(ns/ps0); ty=cy-(pmy-pty+cy)*(ns/ps0); sc=ns; applyT();
  } else if(panning&&e.touches.length===1){
    tx=ptx+(e.touches[0].clientX-px0); ty=pty+(e.touches[0].clientY-py0); applyT();
  }
},{passive:false});

wrap.addEventListener('touchend',e=>{ if(e.touches.length<2)pinching=false; if(e.touches.length===0)panning=false; },{passive:true});

// ─── 드로어 ───
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  document.getElementById('drawer').classList.toggle('open',drawerOpen);
  document.getElementById('ftoggle').classList.toggle('open',drawerOpen);
}

// ─── 필터 ───
function toggleFilter(btn,type){
  afilt[type]=!afilt[type]; btn.classList.toggle('active'); render();
}
function setPrice(btn,mode){
  priceMode=mode;
  document.querySelectorAll('[onclick^="setPrice"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setUnits(btn,min){
  minUnits=min;
  document.querySelectorAll('[onclick^="setUnits"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}

// ─── 구 포커스 ───
const DC={
  all:{x:600,y:375,z:1},
  jung:{x:575,y:270,z:3.2}, dong:{x:745,y:245,z:2.8},
  seo:{x:432,y:285,z:3.2},  nam:{x:558,y:395,z:3.4},
  buk:{x:545,y:148,z:3},    suseong:{x:748,y:433,z:2.8},
  dalseo:{x:420,y:452,z:2.8}, dalseong:{x:312,y:570,z:2.2},
};
function focusD(btn,dist){
  distFocus=dist;
  document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const c=DC[dist], ww=wrap.clientWidth, wh=wrap.clientHeight;
  sc=c.z*(ww/1200); tx=ww/2-c.x*sc; ty=wh/2-c.y*sc; applyT(); render();
}

// ─── 초기 ───
window.addEventListener('resize',initView);
initView(); render();
</script>
